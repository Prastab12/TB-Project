description: >
  FHIR R4 Implementation Guide for Nepal's National Tuberculosis Programme (NTP).
  Covers aggregate monthly district-level reporting using the Bikram Sambat (BS)
  calendar, Case Notification Rate, Treatment Outcome indicators, and integration
  with DHIS2 export data for Kathmandu district (BS 2078–2082).
